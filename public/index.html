<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЦДН Счастливые детки — Нейропсихологический центр</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🧠</div>
        <div class="logo-text">
          <span class="logo-title">ЦДН Счастливые</span>
          <span class="logo-subtitle">детки</span>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- populated by JS -->
    </nav>
    <div class="sidebar-footer" id="sidebarFooter">
      <!-- populated by JS -->
    </div>
  </aside>

  <!-- Mobile header -->
  <header class="mobile-header">
    <button class="burger" id="burger" onclick="toggleSidebar()">☰</button>
    <span class="mobile-title">ЦДН Счастливые детки</span>
  </header>

  <!-- Main content -->
  <main class="main-content" id="mainContent">
    <div class="page-container" id="app">
      <!-- Rendered by router -->
    </div>
  </main>

  <!-- Toast notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Modal overlay -->
  <div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()" id="modalContent"></div>
  </div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/visualizations.js"></script>
  <script src="/js/pages/auth.js"></script>
  <script src="/js/pages/home.js"></script>
  <script src="/js/pages/subscription.js"></script>
  <script src="/js/pages/content.js"></script>
  <script src="/js/pages/analytics.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
